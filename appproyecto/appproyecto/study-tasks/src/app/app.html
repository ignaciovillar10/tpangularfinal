<div class="app-container">
  <header class="header">
    <h1>{{ appTitle }}</h1>
    <p>Organizá tus tareas de estudio de forma simple.</p>
  </header>

  <section class="stats">
    <div class="stat-card">
      <span>Total</span>
      <strong>{{ tasks.length }}</strong>
    </div>

    <div class="stat-card">
      <span>Pendientes</span>
      <strong>{{ pendingTasks }}</strong>
    </div>

    <div class="stat-card">
      <span>Completadas</span>
      <strong>{{ completedTasks }}</strong>
    </div>
  </section>

  <section class="form-card">
    <h2>Nueva tarea</h2>

    <div class="form-grid">
      <input
        type="text"
        placeholder="Ej: Estudiar Angular"
        [(ngModel)]="newTaskTitle"
      />

      <input
        type="text"
        placeholder="Materia"
        [(ngModel)]="newTaskSubject"
      />

      <button (click)="addTask()">Agregar</button>
    </div>
  </section>

  <section class="task-list">
    <h2>Mis tareas</h2>

    @for (task of tasks; track task.id) {
      <article class="task-card" [class.completed]="task.completed">
        <div>
          <h3>{{ task.title }}</h3>
          <p>{{ task.subject }}</p>
        </div>

        <div class="actions">
          <button class="complete-btn" (click)="toggleTask(task)">
            {{ task.completed ? 'Reabrir' : 'Completar' }}
          </button>

          <button class="delete-btn" (click)="deleteTask(task.id)">
            Eliminar
          </button>
        </div>
      </article>
    } @empty {
      <p class="empty-message">No tenés tareas cargadas.</p>
    }
  </section>
</div>
